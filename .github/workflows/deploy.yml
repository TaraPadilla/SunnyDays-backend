name: Deploy Laravel to Namecheap

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 21098 199.188.201.252 >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Test SSH connection
        run: |
          ssh -vvv -p 21098 sunnenlp@199.188.201.252 "echo SSH OK"

      - name: Deploy to server
        run: |
          ssh -p 21098 sunnenlp@199.188.201.252 << 'EOF'
            cd backend.sunnydaysctg.com

            echo "Pulling latest code..."
            git pull origin master

            echo "Installing dependencies..."
            /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader

            echo "Putting app in maintenance mode..."
            php artisan down || true

            echo "Running migrations..."
            php artisan migrate --force

            echo "Clearing caches..."
            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Bringing app back online..."
            php artisan up || true

            echo "Deploy finished successfully."
          EOF